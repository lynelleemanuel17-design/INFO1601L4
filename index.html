<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Box Sizing Example</title>
  <style>
    /* Apply border-box to all elements */
    * {
      box-sizing: border-box;
    }

    /* Example element to show effect */
    div {
      width: 200px;
      padding: 20px;
      border: 5px solid black;
      background-color: lightgray;
    }
  </style>
</head>
<body>
  <div>This div will stay 200px wide even with padding and border.</div>
</body>
</html>
