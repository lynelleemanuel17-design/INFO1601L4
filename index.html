<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Flex Layout</title>

<style>

*{
    box-sizing: border-box;
}

header, footer, section, aside, main{
    padding: 1em;
}

/* Header and Footer */
header, footer{
    color: white;
    background-color: #1976D2;
    flex-grow: 1;
}

/* Aside */
aside{
    display: flex;
    justify-content: center;
    color: #212121;
    background-color: #BBDEFB;
    flex-grow: 3;
}

/* Sections */
section{
    background-color: #FF4081;
    color: white;
    flex-grow: 1;
    margin: 0.5em;
}

/* Main area */
main{
    background-color: #2196F3;
    color: white;
    flex-grow: 7;
}

/* Page layout */
body{
    display: flex;
    flex-direction: column;
    background-color: #FFFFFF;
    height: 100vh;
    width: 100vw;
    margin: 0;
}

/* Row container */
.row{
    display: flex;
    flex-direction: row;
}

/* Middle section height */
div.row{
    flex-grow: 8;
}

/* Column helper */
.col{
    display: flex;
    flex-direction: column;
}

/* Responsive design for small screens */
@media screen and (max-width: 600px) {
    div.row{
        flex-direction: column;
    }
}

</style>
</head>

<body>

<header>Header</header>

<div class="row">
    <aside class="col">
        <section>Section 1</section>
        <section>Section 2</section>
    </aside>

    <main>Main</main>
</div>

<footer>Footer</footer>

</body>
</html>
